name: Update issues.json

on:
  push:
    branches:
      - main

jobs:
  update-issues:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate issues.json from news*.html files
        run: |
          python3 << 'PYEOF'
          import re, json, os, glob
          from pathlib import Path

          files = sorted(glob.glob('news*.html'))
          entries = []

          for f in files:
              # Extraer fecha del filename: news04052026.html -> dd=04 mm=05 yyyy=2026
              m = re.match(r'news(\d{2})(\d{2})(\d{4})\.html', f)
              if not m:
                  continue
              dd, mm, yyyy = m.group(1), m.group(2), m.group(3)
              tag = f'nl-{yyyy}{mm}{dd}'

              content = Path(f).read_text(encoding='utf-8')

              # Extraer fecha legible (nuevo estilo: nl-date, viejo: nl-date-line)
              date = ''
              for pattern in [r'class="nl-date"[^>]*>([^<]+)<', r'class="nl-date-line"[^>]*>([^<]+)<']:
                  dm = re.search(pattern, content)
                  if dm:
                      date = dm.group(1).strip()
                      break

              # Extraer intro (nuevo: nl-intro, viejo: nl-intro-text)
              intro = ''
              for pattern in [r'class="nl-intro"[^>]*>([^<]+)<', r'class="nl-intro-text"[^>]*>([^<]+)<']:
                  im = re.search(pattern, content)
                  if im:
                      intro = im.group(1).strip()
                      break

              # Extraer título desde <title>
              title = ''
              tm = re.search(r'<title>[^·]*·\s*([^<]+)</title>', content)
              if tm:
                  t = tm.group(1).strip()
                  # Solo usar si no es la fecha sola y tiene contenido real
                  if t != date and len(t) > 10:
                      title = t
              # Fallback: primera frase de la intro
              if not title and intro:
                  first = intro.split('.')[0].strip()
                  title = first[:80] if len(first) > 80 else first
              if not title:
                  title = f'Issue {dd}/{mm}/{yyyy}'

              # Contar posts
              posts = len(re.findall(r'class="nl-post"', content))
              if posts == 0:
                  posts = len(re.findall(r'class="nl-post-name"', content))

              entries.append({
                  'tag': tag,
                  'date': date or f'{int(dd)} de {"enero febrero marzo abril mayo junio julio agosto septiembre octubre noviembre diciembre".split()[int(mm)-1]} de {yyyy}',
                  'title': title,
                  'intro': intro,
                  'posts': posts,
                  'url': f,
                  'year': yyyy
              })

          # Ordenar más reciente primero
          entries.sort(key=lambda x: x['tag'], reverse=True)

          with open('issues.json', 'w', encoding='utf-8') as out:
              json.dump(entries, out, ensure_ascii=False, indent=2)

          print(f'issues.json updated: {len(entries)} entries')
          for e in entries:
              print(f"  {e['tag']} — {e['date']} — {e['posts']} posts")
          PYEOF

      - name: Commit updated issues.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add issues.json
          git diff --staged --quiet || git commit -m "auto: update issues.json [skip ci]"
          git push
